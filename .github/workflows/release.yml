name: Build, Test, Sign, and Release
# ASCII-only workflow file; avoid hidden or bidirectional Unicode characters in release automation.

"on":
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  HAS_WINDOWS_SIGNING_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != '' }}

jobs:
  build:
    name: Build desktop app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore openwith-tool.sln

      - name: Build
        run: dotnet build openwith-tool.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test openwith-tool.sln --configuration Release --no-build --no-restore --verbosity normal

      - name: Publish win-x64
        if: github.event_name != 'pull_request'
        run: dotnet publish OpenWithTool.csproj --configuration Release --runtime win-x64 --self-contained true --output publish

      - name: Report unsigned release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.HAS_WINDOWS_SIGNING_CERTIFICATE != 'true'
        shell: pwsh
        run: Write-Warning 'WINDOWS_CERTIFICATE_BASE64 and/or WINDOWS_CERTIFICATE_PASSWORD are not configured; release artifacts will not be signed.'

      - name: Decode and import signing certificate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.HAS_WINDOWS_SIGNING_CERTIFICATE == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $pfxPath = "$env:RUNNER_TEMP\signing-cert.pfx"
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64)
          [IO.File]::WriteAllBytes($pfxPath, $certBytes)

          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $importedCertificates = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password
          $codeSigningEku = '1.3.6.1.5.5.7.3.3'
          $cert = $importedCertificates | Where-Object {
            $_.HasPrivateKey -and
            ($_.EnhancedKeyUsageList | Where-Object { $_.ObjectId -eq $codeSigningEku })
          } | Select-Object -First 1

          if (-not $cert) {
            throw 'The imported PFX does not contain a certificate with a private key and the code-signing EKU.'
          }

          "WINDOWS_CERTIFICATE_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Sign executable
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.HAS_WINDOWS_SIGNING_CERTIFICATE == 'true'
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool.exe$" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) {
            throw "signtool.exe was not found"
          }

          Get-ChildItem publish -Filter *.exe -Recurse | ForEach-Object {
            & $signtool sign `
              /sha "$env:WINDOWS_CERTIFICATE_THUMBPRINT" `
              /fd SHA256 `
              /tr http://timestamp.digicert.com `
              /td SHA256 `
              $_.FullName
          }

      - name: Package release artifact
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath OpenWithTool-win-x64.zip -Force

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v6
        with:
          name: OpenWithTool-win-x64
          path: OpenWithTool-win-x64.zip


  release:
    name: Create GitHub release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v6
        with:
          name: OpenWithTool-win-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: release-${{ github.run_number }}
          target_commitish: ${{ github.sha }}
          name: OpenWithTool release ${{ github.run_number }}
          files: OpenWithTool-win-x64.zip
          generate_release_notes: true
